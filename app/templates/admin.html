<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حقي - الإدارة</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#15803d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="حقي">
<style>@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');*{font-family:'Tajawal',sans-serif;}</style>
</head>
<body class="bg-gray-50" x-data="adminApp()">
{% with active='admin' %}{% include '_navbar.html' %}{% endwith %}
<div class="max-w-6xl mx-auto px-4 py-8" x-init="init()">
  <h1 class="text-3xl font-extrabold text-gray-900 mb-8">لوحة الإدارة</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
      <div class="text-xs text-gray-500 font-medium uppercase tracking-wide">مجموع المواد</div>
      <div class="text-3xl font-extrabold text-gray-900 mt-1" x-text="stats.total_articles">0</div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
      <div class="text-xs text-gray-500 font-medium uppercase tracking-wide">القوانين</div>
      <div class="text-3xl font-extrabold text-gray-900 mt-1" x-text="lawsCount">0</div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
      <div class="text-xs text-gray-500 font-medium uppercase tracking-wide">الأحكام</div>
      <div class="text-3xl font-extrabold text-amber-600 mt-1" x-text="judgementsCount">0</div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 p-5 shadow-sm">
      <div class="text-xs text-gray-500 font-medium uppercase tracking-wide">العقود</div>
      <div class="text-3xl font-extrabold text-purple-600 mt-1" x-text="contractsCount">0</div>
    </div>
  </div>

    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm mb-6">
      <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
        <h2 class="font-bold text-gray-700">القوانين المرفوعة</h2>
      </div>
      <div class="divide-y divide-gray-100">
        <template x-for="(law, key) in stats.laws" :key="key">
          <div class="px-6 py-4 flex items-center justify-between hover:bg-gray-50/50 transition-colors">
            <span class="text-sm font-medium text-gray-700" x-text="law.name"></span>
            <div class="flex items-center gap-3">
              <span class="text-sm text-gray-500" x-text="(law.articles || 0) + ' مادة'"></span>
              <span class="text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded-full font-medium">مفعل</span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm mb-6" x-show="stats.gov">
      <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
        <h2 class="font-bold text-gray-700">
          <span>المعطيات المفتوحة للحكومة</span>
          <span class="text-xs text-gray-400 font-normal mr-2">data.gov.ma</span>
        </h2>
      </div>
      <div class="p-6">
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6">
          <div class="bg-blue-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-blue-700" x-text="stats.gov.summary.total_datasets">0</div>
            <div class="text-xs text-blue-600 mt-1">مجموعة بيانات</div>
          </div>
          <div class="bg-green-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-green-700" x-text="stats.gov.summary.years_range">-</div>
            <div class="text-xs text-green-600 mt-1">سنوات التغطية</div>
          </div>
          <div class="bg-purple-50 rounded-xl p-4 text-center">
            <div class="text-2xl font-extrabold text-purple-700" x-text="stats.gov.summary.categories_count">0</div>
            <div class="text-xs text-purple-600 mt-1">تصنيف</div>
          </div>
        </div>

        <div class="mb-6">
          <h3 class="text-sm font-bold text-gray-600 mb-3">حسب السنة</h3>
          <div class="flex flex-wrap gap-2">
            <template x-for="(count, year) in stats.gov.by_year" :key="year">
              <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-700 text-xs px-3 py-1.5 rounded-full">
                <span x-text="year"></span>
                <span class="text-gray-400">·</span>
                <span class="font-medium" x-text="count"></span>
              </span>
            </template>
          </div>
        </div>

        <div class="mb-6">
          <h3 class="text-sm font-bold text-gray-600 mb-3">حسب التصنيف</h3>
          <div class="flex flex-wrap gap-2">
            <template x-for="(count, cat) in stats.gov.by_category" :key="cat">
              <span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 text-xs px-3 py-1.5 rounded-full">
                <span x-text="cat"></span>
                <span class="text-emerald-400">·</span>
                <span class="font-medium" x-text="count"></span>
              </span>
            </template>
          </div>
        </div>

        <div>
          <h3 class="text-sm font-bold text-gray-600 mb-3">آخر المجموعات</h3>
          <div class="space-y-2">
            <template x-for="ds in stats.gov.recent_datasets.slice(0, 10)" :key="ds.id">
              <a :href="ds.url" target="_blank" rel="noopener"
                 class="block p-3 rounded-xl border border-gray-100 hover:border-green-200 hover:bg-green-50/30 transition-all text-sm">
                <div class="font-medium text-gray-800" x-text="ds.title_ar"></div>
                <div class="text-xs text-gray-400 mt-1" x-text="ds.year ? 'سنة ' + ds.year : ''"></div>
                <div class="flex flex-wrap gap-1 mt-2">
                  <template x-for="cat in ds.categories" :key="cat">
                    <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded" x-text="cat"></span>
                  </template>
                </div>
              </a>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/static/service-worker.js'); }
function adminApp() {
  return {
    stats: { total_articles: 0, laws: {} },
    judgementsCount: 0, contractsCount: 0,
    get lawsCount() { return Object.keys(this.stats.laws).length; },
    async init() {
      try {
        const r = await fetch('/api/stats');
        this.stats = await r.json();
      } catch(e) { console.error(e); }
      try {
        const r = await fetch('/api/judgements?per_page=1');
        const d = await r.json();
        this.judgementsCount = d.total;
      } catch(e) {}
      try {
        const r = await fetch('/api/contracts');
        const d = await r.json();
        this.contractsCount = Object.keys(d).length;
      } catch(e) {}
    },
  };
}
</script>
</body>
</html>
