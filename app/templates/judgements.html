<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حقي - الأحكام القضائية</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#15803d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="حقي">
<style>@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');*{font-family:'Tajawal',sans-serif;}</style>
</head>
<body class="bg-gray-50" x-data="judgementsApp()">
{% with active='judgements' %}{% include '_navbar.html' %}{% endwith %}
<div class="max-w-6xl mx-auto px-4 py-8">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-gray-900">الأحكام القضائية</h1>
    <p class="text-gray-500 mt-1">أحكام محكمة النقض المغربية · <span class="font-semibold text-green-600" x-text="totalCount"></span> قرار</p>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-2xl border border-gray-200 p-4 mb-6 shadow-sm">
    <div class="flex flex-col md:flex-row gap-3">
      <div class="flex-1 relative">
        <svg class="w-4 h-4 text-gray-400 absolute right-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="text" x-model="search" @input.debounce="load()" class="w-full pr-10 pl-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm" placeholder="بحث في الأحكام...">
      </div>
      <select x-model="chamberFilter" @change="load()" class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
        <option value="">جميع الغرف</option>
        <template x-for="c in filters.chambers" :key="c">
          <option :value="c" x-text="c || 'بدون غرفة'"></option>
        </template>
      </select>
      <select x-model="yearFilter" @change="load()" class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
        <option value="">جميع السنوات</option>
        <template x-for="y in filters.years" :key="y">
          <option :value="y" x-text="y"></option>
        </template>
      </select>
    </div>
  </div>

  <!-- Empty State -->
  <template x-if="!loading && items.length === 0">
    <div class="bg-white rounded-2xl border border-gray-200 p-16 text-center">
      <div class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-gray-500">لا توجد أحكام مطابقة للبحث</p>
    </div>
  </template>

  <!-- Loading Skeleton -->
  <template x-if="loading">
    <div class="space-y-4">
      <template x-for="i in 3" :key="i">
        <div class="bg-white rounded-2xl border border-gray-200 p-6 animate-pulse">
          <div class="h-5 bg-gray-200 rounded-lg w-3/4 mb-3"></div>
          <div class="h-3 bg-gray-100 rounded w-1/4 mb-4"></div>
          <div class="h-3 bg-gray-100 rounded w-full mb-2"></div>
          <div class="h-3 bg-gray-100 rounded w-5/6"></div>
        </div>
      </template>
    </div>
  </template>

  <!-- Results -->
  <div class="space-y-4">
    <template x-for="item in items" :key="item.link">
      <div class="bg-white rounded-2xl border border-gray-200 p-6 hover:shadow-md hover:border-green-200 transition-all duration-200">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <h3 class="text-base font-bold text-gray-900 leading-relaxed" x-text="item.title"></h3>
            <div class="flex flex-wrap gap-2 mt-2">
              <span x-show="item.chamber" class="text-xs bg-amber-50 text-amber-700 px-2.5 py-1 rounded-full border border-amber-100">غرفة <span x-text="item.chamber"></span></span>
              <span x-show="item.year" class="text-xs bg-gray-50 text-gray-500 px-2.5 py-1 rounded-full border border-gray-200" x-text="item.year"></span>
            </div>
            <p class="mt-3 text-sm text-gray-600 leading-relaxed line-clamp-3" x-text="item.description"></p>
            <a :href="item.link" target="_blank" class="inline-flex items-center gap-1 mt-3 text-sm text-green-600 hover:text-green-700 font-medium transition-colors">
              عرض المصدر
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </a>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Pagination -->
  <div x-show="totalPages > 1" class="flex items-center justify-center gap-2 mt-8">
    <button @click="page > 1 && goto(page - 1)" :disabled="page <= 1" class="px-4 py-2 rounded-xl text-sm font-medium transition-all" :class="page <= 1 ? 'bg-gray-50 text-gray-300 cursor-not-allowed' : 'bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300'">السابق</button>
    <template x-for="p in visiblePages" :key="p">
      <button @click="goto(p)" class="w-9 h-9 rounded-xl text-sm font-medium transition-all" :class="p === page ? 'bg-gradient-to-br from-green-600 to-green-700 text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'" x-text="p"></button>
    </template>
    <button @click="page < totalPages && goto(page + 1)" :disabled="page >= totalPages" class="px-4 py-2 rounded-xl text-sm font-medium transition-all" :class="page >= totalPages ? 'bg-gray-50 text-gray-300 cursor-not-allowed' : 'bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300'">التالي</button>
  </div>
</div>
<script>
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/static/service-worker.js'); }
function judgementsApp() {
  return {
    items: [],
    total: 0,
    totalPages: 0,
    page: 1,
    perPage: 10,
    search: '',
    chamberFilter: '',
    yearFilter: '',
    filters: { chambers: [], years: [] },
    loading: true,
    get totalCount() { return this.total; },
    get visiblePages() {
      const pages = [];
      const start = Math.max(1, this.page - 2);
      const end = Math.min(this.totalPages, this.page + 2);
      for (let i = start; i <= end; i++) pages.push(i);
      return pages;
    },
    async load() {
      this.loading = true;
      this.page = 1;
      await this.fetchItems();
    },
    async goto(p) {
      this.page = p;
      await this.fetchItems();
    },
    async fetchItems() {
      try {
        const params = new URLSearchParams({
          search: this.search,
          chamber: this.chamberFilter,
          page: this.page,
          per_page: this.perPage,
        });
        if (this.yearFilter) params.set('year', this.yearFilter);
        const res = await fetch(`/api/judgements?${params}`);
        const data = await res.json();
        this.items = data.items;
        this.total = data.total;
        this.totalPages = data.total_pages;
        this.filters = data.filters;
      } catch(e) {
        console.error(e);
      } finally {
        this.loading = false;
      }
    },
    init() { this.fetchItems(); },
  };
}
</script>
</body>
</html>
