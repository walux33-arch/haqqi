<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حقي - العقود</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#15803d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="حقي">
<style>@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');*{font-family:'Tajawal',sans-serif;}</style>
</head>
<body class="bg-gray-50" x-data="contractsApp()">
{% with active='contracts' %}{% include '_navbar.html' %}{% endwith %}
<div class="max-w-4xl mx-auto px-4 py-8">

  <template x-if="!selectedType">
    <div>
      <h1 class="text-3xl font-extrabold text-gray-900">العقود القانونية</h1>
      <p class="text-gray-500 mt-1 mb-6">اختر نوع العقد باش تولّد PDF جاهز للتوقيع</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <template x-for="(tpl, key) in templates" :key="key">
          <div @click="selectType(key)" class="bg-white rounded-2xl border border-gray-200 p-6 hover:shadow-md hover:border-green-200 hover:-translate-y-0.5 transition-all duration-200 cursor-pointer group">
            <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center mb-3 group-hover:bg-purple-100 transition-colors">
              <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <h3 class="font-bold text-gray-900" x-text="tpl.title"></h3>
            <p class="text-sm text-gray-500 mt-1" x-text="tpl.description"></p>
          </div>
        </template>
      </div>
    </div>
  </template>

  <template x-if="selectedType">
    <div>
      <button @click="selectedType = ''" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 transition-colors mb-6">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        العودة للائحة
      </button>
      <div class="bg-white rounded-2xl border border-gray-200 p-6 sm:p-8 shadow-sm">
        <h2 class="text-2xl font-bold text-gray-900 mb-6" x-text="templates[selectedType]?.title"></h2>
        <form @submit.prevent="generate" class="space-y-4">
          <template x-for="field in templates[selectedType]?.fields" :key="field.name">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="field.label"></label>
              <input :type="field.type || 'text'" :name="field.name" x-model="formData[field.name]" :required="true"
                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm text-right transition-all">
            </div>
          </template>
          <button type="submit" class="inline-flex items-center gap-2 bg-gradient-to-l from-green-600 to-green-700 text-white px-6 py-3 rounded-xl hover:shadow-lg hover:from-green-700 hover:to-green-800 transition-all duration-200 font-medium text-sm" x-text="loading ? 'جاري التوليد...' : 'توليد PDF وتحميل'"></button>
        </form>
        <div x-show="error" class="mt-4 p-4 bg-red-50 border border-red-100 rounded-xl text-sm text-red-700" x-text="error"></div>
      </div>
    </div>
  </template>

</div>
<script>
function contractsApp() {
  return {
    templates: {},
    selectedType: '',
    formData: {},
    loading: false,
    error: '',
    async init() {
      try {
        const r = await fetch('/api/contracts');
        this.templates = await r.json();
      } catch(e) { console.error(e); }
    },
    selectType(key) {
      this.selectedType = key;
      this.formData = {};
      this.error = '';
    },
    async generate() {
      this.loading = true;
      this.error = '';
      try {
        const r = await fetch('/api/contracts/generate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ contract_type: this.selectedType, data: this.formData }),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = this.selectedType + '.pdf';
        a.click();
        URL.revokeObjectURL(url);
      } catch(e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
</body>
</html>
